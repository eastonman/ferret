name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build-test (${{ matrix.cc }} on ${{ matrix.os }})
    timeout-minutes: 45
    strategy:
      fail-fast: false
      # Explicit include cells so we can pair compilers with OSes without
      # generating unwanted combinations. FERRET_WERROR is ON by default,
      # so every cell here doubles as a warning-cleanliness check.
      matrix:
        include:
          # --- Linux x86_64 ---
          - { os: ubuntu-latest, cc: gcc-13, cxx: g++-13, apt: "gcc-13 g++-13" }
          - { os: ubuntu-latest, cc: gcc-14, cxx: g++-14, apt: "gcc-14 g++-14" }
          - { os: ubuntu-latest, cc: clang-17, cxx: clang++-17, apt: "clang-17" }
          - { os: ubuntu-latest, cc: clang-18, cxx: clang++-18, apt: "clang-18" }
          # --- Linux aarch64 ---
          - { os: ubuntu-24.04-arm, cc: gcc-14, cxx: g++-14, apt: "gcc-14 g++-14" }
          - { os: ubuntu-24.04-arm, cc: clang-18, cxx: clang++-18, apt: "clang-18" }
          # --- macOS arm64 (Apple Clang from Xcode) ---
          - { os: macos-latest, cc: clang, cxx: clang++, apt: "" }
    runs-on: ${{ matrix.os }}
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: install toolchain + ninja (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ${{ matrix.apt }}

      - name: install ninja (macos)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03  # v1.2.23
        with:
          key: ${{ matrix.os }}-${{ matrix.cc }}-${{ hashFiles('CMakeLists.txt', 'flake.lock') }}

      - name: print compiler version
        run: ${{ matrix.cxx }} --version

      - name: configure
        env:
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache
        run: cmake -S . -B build -GNinja

      - name: build
        run: cmake --build build

      - name: test
        run: ctest --test-dir build --output-on-failure

  android-cross-build:
    name: android-cross-build (arm64-v8a, api-35)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: install ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: locate Android NDK
        run: |
          # ubuntu-latest runners ship the Android NDK at ANDROID_NDK_LATEST_HOME.
          # Fail fast with a useful message if that assumption breaks.
          if [ -z "${ANDROID_NDK_LATEST_HOME:-}" ] || [ ! -f "$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake" ]; then
            echo "ANDROID_NDK_LATEST_HOME not usable: '$ANDROID_NDK_LATEST_HOME'" >&2
            exit 1
          fi
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"

      - name: configure
        run: |
          cmake -S . -B build-android-arm64 -GNinja \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-35 \
            -DCMAKE_BUILD_TYPE=Release

      - name: build
        run: cmake --build build-android-arm64
